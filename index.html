<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老婆的溫馨料理助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-[#fdf6f0] text-[#4a3b32] pb-12">
    <div id="app" class="max-w-md mx-auto px-4 pt-6">
        <h1 class="text-2xl font-bold text-center mb-6">老婆的溫馨料理助手</h1>
        
        <!-- Tabs -->
        <div class="flex bg-white p-1 rounded-xl shadow-sm border mb-6">
            <button @click="currentTab = 'record'" :class="currentTab === 'record' ? 'bg-orange-400 text-white' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium">紀錄</button>
            <button @click="currentTab = 'menu'" :class="currentTab === 'menu' ? 'bg-orange-400 text-white' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium">菜單庫</button>
        </div>

        <!-- 紀錄晚餐 -->
        <div v-show="currentTab === 'record'" class="bg-white p-5 rounded-2xl shadow-sm border">
            <form @submit.prevent="submitRecord" class="space-y-4">
                <input type="date" v-model="recordForm.日期" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="recordForm.菜式1" placeholder="菜式一" required class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="recordForm.菜式2" placeholder="菜式二" class="w-full px-3 py-2 border rounded-xl">
                <button type="submit" class="w-full bg-orange-400 text-white py-3 rounded-xl font-bold">送出紀錄</button>
            </form>
        </div>

        <!-- 菜單庫 -->
        <div v-show="currentTab === 'menu'" class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <form @submit.prevent="submitNewDish" class="space-y-3">
                    <input type="text" v-model="dishForm.菜名" placeholder="菜名" required class="w-full px-3 py-2 border rounded-xl">
                    <input type="text" v-model="dishForm.備註" placeholder="備註" class="w-full px-3 py-2 border rounded-xl">
                    <input type="text" v-model="dishForm.營養健康好處" placeholder="營養健康好處" class="w-full px-3 py-2 border rounded-xl">
                    <button type="submit" class="w-full bg-orange-400 text-white py-2 rounded-xl font-bold">新增菜色</button>
                </form>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border h-[400px] overflow-y-auto">
                <ul class="divide-y">
                    <li v-for="d in dishes" :key="d.菜名" class="py-4">
                        <div class="flex justify-between font-bold text-lg">{{ d.菜名 }}
                            <button @click="deleteDish(d.菜名)" class="text-rose-400 text-xs">刪除</button>
                        </div>
                        <div class="mt-2 text-sm">
                            <p class="text-orange-600"><i class="fa-solid fa-note-sticky mr-1"></i>備註：{{ d.備註 || '無' }}</p>
                            <p class="text-emerald-600"><i class="fa-solid fa-leaf mr-1"></i>好處：{{ d.營養健康好處 || '無' }}</p>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const currentTab = ref('record');
                const apiUrl = 'https://script.google.com/macros/s/AKfycbxM3wvkhTYPzLlVdbdbZMNcdV2uzHUCnZGgBOMFh66VKrlopiOwTkvv6EOy0Uy29M6P/exec';
                const dishes = ref([]);
                const dishForm = ref({ 菜名: '', 分類: '', 難易度: '', 備註: '', 營養健康好處: '' });
                const recordForm = ref({ 日期: new Date().toISOString().split('T')[0], 菜式1: '', 菜式2: '', 評價星級: 5, 心得備註: '' });

                const fetchData = async () => {
                    const res = await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'getDishes' }) });
                    const j = await res.json();
                    if (j.status === 'success') dishes.value = j.data;
                };

                const submitNewDish = async () => {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addDish', data: dishForm.value }) });
                    fetchData();
                    dishForm.value = { 菜名: '', 分類: '', 難易度: '', 備註: '', 營養健康好處: '' };
                };

                const deleteDish = async (name) => {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'deleteDish', data: { 菜名: name } }) });
                    fetchData();
                };

                const submitRecord = async () => {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addRecord', data: recordForm.value }) });
                    alert('紀錄成功');
                };

                onMounted(fetchData);
                return { currentTab, dishes, dishForm, recordForm, submitNewDish, submitRecord, deleteDish };
            }
        }).mount('#app');
    </script>
</body>
</html>
