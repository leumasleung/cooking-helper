<!-- =================【編輯與檢視 菜色彈窗 Modal】================= -->
        <div v-if="showModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl relative animate-in fade-in zoom-in-95 duration-200">
                <button type="button" @click="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
                
                <h3 class="text-base font-bold text-brand-dark border-b pb-2 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-brand-accent"></i> 編輯/檢視 菜色資訊
                </h3>

                <form @submit.prevent="submitEditDish" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">菜名</label>
                        <input type="text" v-model="editingDish.菜名" required class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-brand-accent">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">分類</label>
                            <select v-model="editingDish.分類" required class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:ring-1 focus:ring-brand-accent">
                                <option value="肉類">🥩 肉類</option>
                                <option value="蔬菜">🥦 蔬菜</option>
                                <option value="魚/海鮮">🐟 魚/海鮮</option>
                                <option value="湯品">🥣 湯品</option>
                                <option value="其它(如豆腐類)">🍳 其它(豆腐)</option>
                                <option value="特別特色菜">🍜 特色菜</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">難易度</label>
                            <select v-model="editingDish.難易度" required class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:ring-1 focus:ring-brand-accent">
                                <option value="簡單">🟢 簡單</option>
                                <option value="中等">🟡 中等</option>
                                <option value="困難">🔴 困難</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">🥦 營養健康好處</label>
                        <input type="text" v-model="editingDish.營養健康好處" placeholder="例：高纖維有助消化" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-brand-accent">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">備註 / 煮法</label>
                        <input type="text" v-model="editingDish.備註" placeholder="例：爆香蒜頭，大火快炒" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-brand-accent">
                    </div>

                    <!-- 按鈕群 -->
                    <div class="flex flex-col gap-2 pt-2">
                        <div class="flex gap-2">
                            <button type="button" @click="closeModal" class="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl text-xs font-semibold hover:bg-gray-200 transition">
                                取消
                            </button>
                            <button type="submit" :disabled="submitting" class="flex-1 bg-brand-accent text-white py-2.5 rounded-xl text-xs font-semibold hover:bg-opacity-95 transition flex items-center justify-center gap-1.5">
                                <i v-if="submitting" class="fa-solid fa-spinner animate-spin"></i>
                                <span v-else><i class="fa-solid fa-floppy-disk"></i> 儲存修改</span>
                            </button>
                        </div>
                        
                        <!-- ⚠️ 重點修正：改用 @click.prevent 且直接帶入 editingDish.菜名 確保一定能點擊並執行 -->
                        <button type="button" @click.prevent="confirmDelete(editingDish.菜名)" :disabled="submitting" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 py-2 rounded-xl text-xs font-semibold transition flex items-center justify-center gap-1.5 border border-rose-200/50">
                            <i v-if="submitting" class="fa-solid fa-spinner animate-spin"></i>
                            <span v-else><i class="fa-solid fa-trash-can"></i> 刪除此菜色</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <!-- =============================================================== -->
