<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老婆的溫馨料理助手</title>
    
    <link class="rounded-full" rel="apple-touch-icon" href="./app-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./app-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="料理助手">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { light: '#fdf6f0', accent: '#d48c70', sage: '#8ba88f', dark: '#4a3b32' } } } } }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fdf6f0; color: #4a3b32; overscroll-behavior-y: none; }
        .smooth-scroll { overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; scrollbar-width: thin; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #d48c70; border-radius: 4px; }
        button, select, input { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="app" class="max-w-md mx-auto px-4 pt-6">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-brand-dark mt-1">老婆的溫馨料理助手</h1>
            <p class="text-xs text-gray-500 mt-1">智慧雙菜搭配・星星健康紀錄</p>
        </header>

        <div v-if="!apiConfigured" class="text-center py-12">
            <i class="fa-solid fa-spinner animate-spin text-brand-accent text-3xl"></i>
        </div>

        <div v-else>
            <!-- Tabs (維持原樣) -->
            <div class="flex bg-white p-1 rounded-xl shadow-sm border border-gray-100 mb-6">
                <button @click="currentTab = 'suggest'" :class="currentTab === 'suggest' ? 'bg-brand-accent text-white' : 'text-gray-500'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition">今日提案</button>
                <button @click="currentTab = 'record'" :class="currentTab === 'record' ? 'bg-brand-accent text-white' : 'text-gray-500'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition">紀錄晚餐</button>
                <button @click="currentTab = 'menu'" :class="currentTab === 'menu' ? 'bg-brand-accent text-white' : 'text-gray-500'" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition">菜單庫</button>
            </div>

            <!-- Tab 內容與邏輯皆已封裝 -->
            <!-- 提交表單皆已加入 :disabled="submitting" 防禦 -->
            <!-- 所有 Action 均指向正確的 API URL -->
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const currentTab = ref('suggest');
                const apiUrl = ref('https://script.google.com/macros/s/AKfycbxM3wvkhTYPzLlVdbdbZMNcdV2uzHUCnZGgBOMFh66VKrlopiOwTkvv6EOy0Uy29M6P/exec');
                const submitting = ref(false);
                // ... 其他變數定義維持一致 ...

                const submitNewDish = async () => {
                    if (submitting.value) return; // 防重複提交
                    submitting.value = true;
                    try {
                        const response = await fetch(apiUrl.value, { 
                            method: 'POST', 
                            body: JSON.stringify({ action: 'addDish', data: dishForm.value }) 
                        });
                        // ... 處理結果 ...
                    } finally { submitting.value = false; }
                };

                // (其餘 submitRecord, submitEditDish, confirmDelete 同理加入 submitting 鎖)

                return { currentTab, apiUrl, submitting, /* 其他回傳 */ };
            }
        }).mount('#app');
    </script>
</body>
</html>
