<script>
    // ... 在 submitNewDish 函式中加入處理重複邏輯 ...
    const submitNewDish = async () => {
        if (submitting.value) return;
        submitting.value = true;
        try {
            const payload = { action: 'addDish', data: { ...dishForm.value } };
            const response = await fetch(apiUrl.value, { 
                method: 'POST', 
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload) 
            });
            const result = await response.json();
            
            // 偵測是否重複
            if (result.status === 'duplicate') {
                alert(result.message); // 跳出警告：該菜名已存在
            } else if (result.status === 'success') {
                alert('新菜色已成功加入菜單庫！');
                dishes.value.push({ ...dishForm.value });
                dishForm.value.菜名 = '';
            } else {
                alert('新增失敗：' + (result.message || '未知錯誤'));
            }
        } catch (e) {
            console.error(e);
            alert('網路連線或 API 執行出錯！');
        } finally {
            submitting.value = false;
        }
    };
    // ... 其餘邏輯與 保持一致 ...
</script>
