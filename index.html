<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老婆的溫馨料理助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdf6f0; color: #4a3b32; overscroll-behavior-y: none; }
        .smooth-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #d48c70; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="app" class="max-w-md mx-auto px-4 pt-6">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-brand-dark">老婆的溫馨料理助手</h1>
        </header>

        <!-- Tabs -->
        <div class="flex bg-white p-1 rounded-xl shadow-sm border mb-6">
            <button @click="currentTab = 'suggest'" :class="currentTab === 'suggest' ? 'bg-orange-400 text-white' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium">今日提案</button>
            <button @click="currentTab = 'record'" :class="currentTab === 'record' ? 'bg-orange-400 text-white' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium">紀錄晚餐</button>
            <button @click="currentTab = 'menu'" :class="currentTab === 'menu' ? 'bg-orange-400 text-white' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium">菜單庫</button>
        </div>

        <!-- TAB: 紀錄晚餐 -->
        <div v-show="currentTab === 'record'" class="bg-white p-5 rounded-2xl shadow-sm border">
            <form @submit.prevent="submitRecord" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500">日期</label>
                    <input type="date" v-model="recordForm.日期" required class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500">菜式一</label>
                    <input type="text" v-model="recordForm.菜式1" required class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500">菜式二</label>
                    <input type="text" v-model="recordForm.菜式2" class="w-full px-3 py-2 border rounded-xl">
                </div>
                <button type="submit" class="w-full bg-orange-400 text-white py-3 rounded-xl font-bold">送出紀錄</button>
            </form>
        </div>

        <!-- TAB: 菜單庫 -->
        <div v-show="currentTab === 'menu'" class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border">
                <form @submit.prevent="submitNewDish" class="space-y-3">
                    <input type="text" v-model="dishForm.菜名" placeholder="菜名" required class="w-full px-3 py-2 border rounded-xl">
                    <button type="submit" class="w-full bg-orange-400 text-white py-2 rounded-xl">新增菜色</button>
                </form>
            </div>
            <div class="h-96 smooth-scroll custom-scroll bg-white p-4 rounded-2xl shadow-sm border">
                <ul>
                    <li v-for="dish in dishes" :key="dish.菜名" class="py-3 border-b flex justify-between items-center">
                        {{ dish.菜名 }}
                        <button @click="deleteDish(dish.菜名)" class="text-rose-500 text-xs">刪除</button>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const currentTab = ref('suggest');
                const apiUrl = 'https://script.google.com/macros/s/AKfycbxM3wvkhTYPzLlVdbdbZMNcdV2uzHUCnZGgBOMFh66VKrlopiOwTkvv6EOy0Uy29M6P/exec';
                const dishes = ref([]);
                const recordForm = ref({ 日期: new Date().toISOString().split('T')[0], 菜式1: '', 菜式2: '', 評價星級: 5, 心得備註: '' });
                const dishForm = ref({ 菜名: '', 分類: '肉類', 難易度: '簡單', 備註: '', 營養健康好處: '' });

                const fetchData = async () => {
                    const res = await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'getDishes' }) });
                    const resJson = await res.json();
                    if (resJson.status === 'success') dishes.value = resJson.data;
                };

                const submitNewDish = async () => {
                    const res = await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addDish', data: dishForm.value }) });
                    const resJson = await res.json();
                    alert(resJson.message);
                    fetchData();
                };

                const submitRecord = async () => {
                    const res = await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addRecord', data: recordForm.value }) });
                    const resJson = await res.json();
                    alert(resJson.message);
                };

                const deleteDish = async (name) => {
                    if(!confirm('確定刪除？')) return;
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'deleteDish', data: { 菜名: name } }) });
                    fetchData();
                };

                onMounted(fetchData);
                return { currentTab, dishes, recordForm, dishForm, submitNewDish, submitRecord, deleteDish };
            }
        }).mount('#app');
    </script>
</body>
</html>
