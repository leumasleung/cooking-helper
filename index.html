<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老婆的溫馨料理助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fdf6f0; color: #4a3b32; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #d48c70; border-radius: 4px; }
    </style>
</head>
<body class="pb-12">
    <div id="app" class="max-w-md mx-auto px-4 pt-6">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#4a3b32]">老婆的溫馨料理助手</h1>
        </header>

        <!-- Tabs -->
        <div class="flex bg-white p-1 rounded-xl shadow-sm border mb-6">
            <button @click="currentTab = 'record'" :class="currentTab === 'record' ? 'bg-[#d48c70] text-white shadow-sm' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium transition">紀錄晚餐</button>
            <button @click="currentTab = 'menu'" :class="currentTab === 'menu' ? 'bg-[#d48c70] text-white shadow-sm' : 'text-gray-500'" class="flex-1 py-2 rounded-lg font-medium transition">菜單庫</button>
        </div>

        <!-- TAB 1: 紀錄 -->
        <div v-show="currentTab === 'record'" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="space-y-4">
                <input type="date" v-model="recordForm.日期" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="recordForm.菜式1" placeholder="菜式一" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="recordForm.菜式2" placeholder="菜式二" class="w-full px-3 py-2 border rounded-xl">
                <div class="flex items-center gap-2 text-2xl py-2">
                    <i v-for="star in 5" @click="recordForm.評價星級 = star" :class="star <= recordForm.評價星級 ? 'fa-solid text-amber-400' : 'fa-regular text-gray-300'" class="fa-star cursor-pointer"></i>
                </div>
                <button @click="submitRecord" class="w-full bg-[#d48c70] text-white py-3 rounded-xl font-bold active:scale-[0.98]">送出美味紀錄</button>
            </div>
        </div>

        <!-- TAB 2: 菜單庫 -->
        <div v-show="currentTab === 'menu'" class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <input type="text" v-model="dishForm.菜名" placeholder="菜名" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="dishForm.備註" placeholder="備註" class="w-full px-3 py-2 border rounded-xl">
                <input type="text" v-model="dishForm.營養健康好處" placeholder="營養健康好處" class="w-full px-3 py-2 border rounded-xl">
                <button @click="submitNewDish" class="w-full bg-[#d48c70] text-white py-2 rounded-xl font-bold">新增菜色</button>
            </div>
            
            <div class="h-[400px] overflow-y-auto custom-scroll space-y-3">
                <div v-for="d in dishes" :key="d.菜名" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-start">
                    <div class="flex-1">
                        <h3 class="font-bold text-lg text-[#4a3b32]">{{ d.菜名 }}</h3>
                        <div class="mt-2 space-y-1">
                            <p class="text-xs text-amber-700 bg-amber-50 px-2 py-1 rounded inline-block"><i class="fa-solid fa-note-sticky mr-1"></i>備註：{{ d.備註 || '無' }}</p>
                            <br>
                            <p class="text-xs text-emerald-700 bg-emerald-50 px-2 py-1 rounded inline-block mt-1"><i class="fa-solid fa-leaf mr-1"></i>好處：{{ d.營養健康好處 || '無' }}</p>
                        </div>
                    </div>
                    <button @click="deleteDish(d.菜名)" class="text-rose-400 ml-2 p-2 hover:bg-rose-50 rounded-full"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const currentTab = ref('record');
                const apiUrl = 'https://script.google.com/macros/s/AKfycbxM3wvkhTYPzLlVdbdbZMNcdV2uzHUCnZGgBOMFh66VKrlopiOwTkvv6EOy0Uy29M6P/exec';
                const dishes = ref([]);
                const dishForm = ref({ 菜名: '', 備註: '', 營養健康好處: '' });
                const recordForm = ref({ 日期: new Date().toISOString().split('T')[0], 菜式1: '', 菜式2: '', 評價星級: 5 });

                const fetchData = async () => {
                    const res = await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'getDishes' }) });
                    const j = await res.json();
                    if (j.status === 'success') dishes.value = j.data;
                };

                const submitNewDish = async () => {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addDish', data: dishForm.value }) });
                    fetchData();
                    dishForm.value = { 菜名: '', 備註: '', 營養健康好處: '' };
                };

                const submitRecord = async () => {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'addRecord', data: recordForm.value }) });
                    alert('紀錄成功');
                };

                const deleteDish = async (name) => {
                    if(!confirm('確定刪除此菜色？')) return;
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'deleteDish', data: { 菜名: name } }) });
                    fetchData();
                };

                onMounted(fetchData);
                return { currentTab, dishes, dishForm, recordForm, submitNewDish, submitRecord, deleteDish };
            }
        }).mount('#app');
    </script>
</body>
</html>
